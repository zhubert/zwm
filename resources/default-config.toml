# ZWM Configuration
# Place this file at ~/.zwm.toml or ~/.config/zwm/zwm.toml

[gaps]
inner = 0
outer = 0

[keybindings.main]
# Focus
alt-h = "focus left"
alt-j = "focus down"
alt-k = "focus up"
alt-l = "focus right"

# Move
alt-shift-h = "move left"
alt-shift-j = "move down"
alt-shift-k = "move up"
alt-shift-l = "move right"

# Layout
alt-enter = "layout horizontal"
alt-v = "layout vertical"
alt-f = "fullscreen"

# Workspaces
alt-1 = "workspace 1"
alt-2 = "workspace 2"
alt-3 = "workspace 3"
alt-4 = "workspace 4"
alt-5 = "workspace 5"
alt-6 = "workspace 6"
alt-7 = "workspace 7"
alt-8 = "workspace 8"
alt-9 = "workspace 9"

# Move to workspace
alt-shift-1 = "move-to-workspace 1"
alt-shift-2 = "move-to-workspace 2"
alt-shift-3 = "move-to-workspace 3"
alt-shift-4 = "move-to-workspace 4"
alt-shift-5 = "move-to-workspace 5"
alt-shift-6 = "move-to-workspace 6"
alt-shift-7 = "move-to-workspace 7"
alt-shift-8 = "move-to-workspace 8"
alt-shift-9 = "move-to-workspace 9"

# Close
alt-shift-q = "close"

# Reload config
alt-shift-r = "reload-config"

# Window rules
[[on-window-detected]]
match-app-name = "Finder"
run = "layout floating"

[[on-window-detected]]
match-title = "Preferences"
run = "layout floating"

[[on-window-detected]]
match-title = "Settings"
run = "layout floating"
